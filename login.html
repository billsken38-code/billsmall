<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - BILLS MALL</title>

<link rel="stylesheet" href="style.css">

<!-- ICONS -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: linear-gradient(135deg, #eae9db, #d2b48c);
  margin: 0;
  font-family: Arial, sans-serif;
}

.login-container {
  background: white;
  padding: 35px;
  border-radius: 15px;
  width: 320px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  text-align: center;
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}

.login-container h2 {
  margin-bottom: 20px;
  color: #4B2E2B;
}

/* INPUT GROUP */
.input-group {
  position: relative;
  margin: 12px 0;
}

.input-group i {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: #8B5E3C;
}

.input-group input {
  width: 100%;
  padding: 10px 35px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 14px;
  transition: 0.3s;
}

.input-group input:focus {
  border-color: #8B5E3C;
  box-shadow: 0 0 5px rgba(139,94,60,0.3);
  outline: none;
}

/* PASSWORD TOGGLE */
.toggle-password {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  color: #8B5E3C;
}

/* BUTTONS */
button {
  width: 100%;
  padding: 10px;
  margin-top: 12px;
  background: #4B2E2B;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

button:hover {
  background: #8B5E3C;
}

.alt-btn {
  background: #8B5E3C;
}

.alt-btn:hover {
  background: #4B2E2B;
}

/* REMEMBER */
.remember {
  display: flex;
  align-items: center;
  font-size: 13px;
  margin-top: 10px;
  gap: 5px;
}

/* FOOTER */
.login-footer {
  margin-top: 15px;
  font-size: 12px;
  color: gray;
}
</style>
</head>

<body>

<div class="login-container">
  <h2>BILLS MALL</h2>

  <!-- EMAIL -->
  <div class="input-group">
    <i class="fa fa-envelope"></i>
    <input type="email" id="email" placeholder="Enter Email">
  </div>

  <!-- PASSWORD -->
  <div class="input-group">
    <i class="fa fa-lock"></i>
    <input type="password" id="password" placeholder="Enter Password">
    <i class="fa fa-eye toggle-password" onclick="togglePassword()"></i>
  </div>

  <!-- REMEMBER -->
  <div class="remember">
    <input type="checkbox" id="remember">
    <label for="remember">Remember me</label>
  </div>

  <!-- BUTTONS -->
  <button onclick="login()">Login</button>
  <button class="alt-btn" onclick="signup()">Create Account</button>

  <div class="login-footer">
    Secure Login 🔐
  </div>
</div>

<script>
function togglePassword() {
  const pass = document.getElementById("password");
  pass.type = pass.type === "password" ? "text" : "password";
}
</script>

<script type="module" src="auth.js"></script>

</body>
</html>
