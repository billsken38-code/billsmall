</header>

<div class="profile-container">

  <!-- PROFILE HEADER -->
  <div class="profile-header">
    <div class="avatar">👤</div>
    <div>
      <h2 id="user-name">Guest User</h2>
      <p id="user-email">No email saved</p>
    </div>
  </div>

  <!-- STATS DASHBOARD -->
  <div class="stats-grid">

    <div class="stat-card">
      <h3 id="total-orders">0</h3>
      <p>Orders</p>
    </div>

    <div class="stat-card">
      <h3 id="cart-items">0</h3>
      <p>Cart Items</p>
    </div>

    <div class="stat-card">
      <h3 id="total-spent">GHS 0</h3>
      <p>Total Spent</p>
    </div>

  </div>

  <!-- ADDRESS -->
  <div class="section">
    <h3>📍 Saved Address</h3>
    <p id="user-address">No address added</p>
    <button onclick="editAddress()">Edit Address</button>
  </div>

  <!-- ACTIONS -->
  <div class="profile-actions">

    <a href="orders-user.html" class="action-card">📦 Orders</a>
    <a href="cart.html" class="action-card">🛒 Cart</a>

  </div>

  <!-- LOGOUT -->
  <button class="logout-btn" onclick="logout()">🚪 Logout</button>

</div>
