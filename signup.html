<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account - BILLS MALL</title>

<link rel="stylesheet" href="style.css">

<style>
body{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:linear-gradient(135deg,#eae9db,#d2b48c);
  font-family:Arial;
}

.container{
  background:white;
  padding:30px;
  width:320px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
  text-align:center;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#4B2E2B;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  background:#8B5E3C;
}

a{
  color:#8B5E3C;
}
</style>
</head>

<body>

<div class="container">
  <h2>Create Account</h2>

  <input type="text" id="name" placeholder="Full Name">
   <input type="text" id="address" placeholder="Address">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="signup()">Create Account</button>

  <p>
    Already have an account?
    <a href="login.html">Login</a>
  </p>

  <p id="msg"></p>
</div>

<script type="module" src="auth.js"></script>

</body>
</html>
