<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - BILLS MALL</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
  <h1 class="logo">BILLS MALL ADMIN</h1>
  <a href="index.html"><button>Back to Shop</button></a>
</header>

<div class="hero">
  <h2>Admin Dashboard</h2>
  <p>Manage orders, revenue, and customers</p>
</div>

<div class="stats">
  <div class="stat-card">
    <h3 id="total-orders">0</h3>
    <p>Total Orders</p>
  </div>

  <div class="stat-card">
    <h3 id="total-revenue">0</h3>
    <p>Total Revenue</p>
  </div>

  <div class="stat-card">
    <h3 id="pending-orders">0</h3>
    <p>Pending Orders</p>
  </div>
</div>

<div class="admin-container">
  <canvas id="salesChart"></canvas>
</div>

<div class="admin-container" id="admin-container">Checking admin access...</div>

<div id="order-popup" class="order-popup">
  <div class="popup-content">
    <h3>New Order Received!</h3>
    <p id="popup-text"></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module" src="admin.js"></script>

</body>
</html>
