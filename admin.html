<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - BILLS MALL</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 🔐 ADMIN LOGIN -->
<script>
  const password = prompt("Enter admin password:");
  if (password !== "Bilken13245") {
    alert("Access denied!");
    window.location.href = "index.html";
  }
</script>

<!-- NAVBAR -->
<header class="navbar">
  <h1 class="logo">BILLS MALL ADMIN</h1>
  <a href="index.html"><button>Back to Shop</button></a>
</header>

<!-- HERO -->
<div class="hero">
  <h2>Admin Dashboard</h2>
  <p>Manage orders, revenue, and customers</p>
</div>

<!-- STATS -->
<div class="stats">
  <div class="stat-card">
    <h3 id="total-orders">0</h3>
    <p>Total Orders</p>
  </div>

  <div class="stat-card">
    <h3 id="total-revenue">0</h3>
    <p>Total Revenue</p>
  </div>

  <div class="stat-card">
    <h3 id="pending-orders">0</h3>
    <p>Pending Orders</p>
  </div>
</div>

<!-- CHART -->
<div class="admin-container">
  <canvas id="salesChart"></canvas>
</div>

<!-- ORDERS -->
<div class="admin-container" id="admin-container"></div>

<!-- 🔔 POPUP -->
<div id="order-popup" class="order-popup">
  <div class="popup-content">
    <h3>🛒 New Order Received!</h3>
    <p id="popup-text"></p>
  </div>
</div>

<!-- ✅ SCRIPTS (CORRECT POSITION) -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module" src="admin.js"></script>

</body>
</html>
