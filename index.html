
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BILLS MALL</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <script>
  if (!localStorage.getItem("userId")) {
    window.location.href = "login.html";
  }
</script>

  <!-- NAVBAR -->
  <header class="navbar">
    <h1 class="logo">BILLS MALL</h1>
    <input type="text" placeholder="Search products..." id="search-input">
   <div class="search-bar">
  <button onclick="searchProducts()">Search</button>
</div>
 <a href="orders-user.html" class="orders-btn">My Orders</a>
    <a href="cart.html">
      <button class="cart-btn">Cart 🛒</button>
    </a>
  </header>
  
<a href="admin.html" class="admin-link">Admin</a>
</a>

  <!-- HERO SECTION -->
  <section class="hero">
    <h2>Welcome to BILLS MALL</h2>
    <p>Best deals available now!</p>
  </section>

  <!-- MAIN LAYOUT -->
  <div class="container">

<!-- CATEGORY BAR -->
<div class="category-bar">
  <div class="category-card" onclick="filterCategory('all')">All</div>
  <div class="category-card" onclick="filterCategory('electronics')">Electronics</div>
  <div class="category-card" onclick="filterCategory('fashion')">Fashion</div>
  <div class="category-card" onclick="filterCategory('home')">Home</div>
  <div class="category-card" onclick="filterCategory('beauty')">Beauty</div>
  <div class="category-card" onclick="filterCategory('sports')">Sports</div> 
  <div class="category-card" onclick="filterCategory('Accessories')">Accessories</div>
</div>

    <!-- PRODUCTS -->
    <section class="products" id="products-container">
      <!-- Products will now be injected here by script.js -->
    </section>

  </div>

  <div id="lightbox" class="lightbox">
  <span class="close" onclick="closeLightbox()">&times;</span>
  <img class="lightbox-img" src="">
  <button class="prev" onclick="prevImage()">&#10094;</button>
  <button class="next" onclick="nextImage()">&#10095;</button>
</div>


<script type="module" src="script.js"></script>
</body>
</html>
